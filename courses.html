<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExamReady — Daftar Mata Kuliah</title>
  <meta name="description" content="Pilih mata kuliah untuk memulai latihan soal ujian online." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="courses-page">
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>

  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="header-icon" aria-hidden="true">🎓</span>
        <span class="header-title">ExamReady</span>
      </div>
      <div class="header-right">
        <span class="header-user" id="header-user-code"></span>
        <button class="btn-logout" id="btn-logout" title="Keluar">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Keluar
        </button>
      </div>
    </div>
  </header>

  <main class="courses-main">
    <section class="courses-hero">
      <h1 class="courses-title">Dashboard Ujian</h1>
      <p class="courses-subtitle">Mulai sesi latihan atau lihat papan peringkat pencapaian mahasiswa.</p>
    </section>

    <!-- Tabs Container -->
    <div class="tabs-container">
      <button class="tab-btn active" id="tab-courses">📚 Mata Kuliah</button>
      <button class="tab-btn" id="tab-leaderboard">🏆 Peringkat</button>
    </div>

    <!-- Courses Grid Section -->
    <section class="courses-grid-section" id="courses-section">
      <div class="courses-grid" id="courses-grid" aria-label="Daftar mata kuliah">
        <div class="loading-state" id="courses-loading">
          <div class="spinner" aria-label="Memuat..."></div>
          <p>Memuat daftar mata kuliah…</p>
        </div>
      </div>
    </section>

    <!-- Leaderboard Section (Hidden by Default) -->
    <section class="leaderboard-section" id="leaderboard-section" style="display: none;">
      <h2 class="leaderboard-title">🏆 Papan Peringkat Mahasiswa</h2>
      <p class="leaderboard-desc">Peringkat berdasarkan nilai rata-rata latihan soal yang telah diselesaikan.</p>
      <div class="leaderboard-table-wrap">
        <table class="leaderboard-table">
          <thead>
            <tr>
              <th>Posisi</th>
              <th>Nama Mahasiswa</th>
              <th>Rata-rata Nilai</th>
              <th>Mata Kuliah Selesai</th>
            </tr>
          </thead>
          <tbody id="leaderboard-body">
            <!-- Diisi dinamis oleh courses.js -->
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
  <script src="js/music.js"></script>
  <script src="js/courses.js"></script>
</body>
</html>
