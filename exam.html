<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExamReady — Ujian</title>
  <meta name="description" content="Kerjakan soal latihan ujian pilihan ganda secara interaktif." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="exam-page">
  <div class="bg-blob blob-1 blob-dim"></div>
  <div class="bg-blob blob-2 blob-dim"></div>

  <header class="app-header">
    <div class="header-inner">
      <button class="btn-back" id="btn-back" title="Kembali ke daftar mata kuliah">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
        Kembali
      </button>
      <div class="header-brand">
        <span class="header-icon" aria-hidden="true">🎓</span>
        <span class="header-title" id="exam-course-name">Ujian</span>
      </div>
      <div class="header-right">
        <div class="exam-score-bar">
          <span class="score-chip score-chip--correct" id="score-correct" aria-label="Jawaban benar">
            <span class="score-chip-icon" aria-hidden="true">&#10003;</span>
            <span class="score-chip-num" id="count-correct">0</span>
          </span>
          <span class="score-chip score-chip--wrong" id="score-wrong" aria-label="Jawaban salah">
            <span class="score-chip-icon" aria-hidden="true">&#10007;</span>
            <span class="score-chip-num" id="count-wrong">0</span>
          </span>
          <span class="exam-counter" id="exam-counter" aria-label="Nomor soal">1 / 0</span>
        </div>
      </div>
    </div>
  </header>

  <main class="exam-main">
    <!-- Progress bar -->
    <div class="progress-bar-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="progress-bar-wrap">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-bar-fill"></div>
      </div>
      <span class="progress-label" id="progress-label">Soal 1 dari 115</span>
    </div>

    <!-- Soal area -->
    <div class="question-area" id="question-area">
      <div class="loading-state" id="exam-loading">
        <div class="spinner"></div>
        <p>Memuat soal…</p>
      </div>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/music.js"></script>
  <script src="js/exam.js"></script>
</body>
</html>
