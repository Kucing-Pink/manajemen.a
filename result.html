<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExamReady — Hasil Ujian</title>
  <meta name="description" content="Lihat hasil dan review jawaban ujian latihan Anda." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="result-page">
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>

  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="header-icon" aria-hidden="true">🎓</span>
        <span class="header-title">ExamReady</span>
      </div>
    </div>
  </header>

  <main class="result-main">
    <!-- Score card -->
    <section class="score-section">
      <div class="score-card">
        <div class="score-emoji" id="score-emoji" aria-hidden="true">🏆</div>
        <h1 class="score-title" id="score-title">Hasil Ujian</h1>
        <p class="score-course" id="score-course-name">Pengantar Ekonomi Mikro</p>

        <div class="score-ring-wrap">
          <svg class="score-ring" viewBox="0 0 160 160" aria-hidden="true">
            <circle class="ring-bg" cx="80" cy="80" r="68" />
            <circle class="ring-fill" id="ring-fill" cx="80" cy="80" r="68"
              stroke-dasharray="427.3"
              stroke-dashoffset="427.3"
            />
          </svg>
          <div class="score-ring-label">
            <span class="score-number" id="score-number">0</span>
            <span class="score-pct" aria-hidden="true">%</span>
          </div>
        </div>

        <div class="score-stats">
          <div class="stat-box stat-correct">
            <span class="stat-num" id="stat-correct">0</span>
            <span class="stat-label">Benar</span>
          </div>
          <div class="stat-divider" aria-hidden="true"></div>
          <div class="stat-box stat-wrong">
            <span class="stat-num" id="stat-wrong">0</span>
            <span class="stat-label">Salah</span>
          </div>
          <div class="stat-divider" aria-hidden="true"></div>
          <div class="stat-box stat-total">
            <span class="stat-num" id="stat-total">0</span>
            <span class="stat-label">Total Soal</span>
          </div>
        </div>

        <div class="score-actions">
          <button class="btn-primary" id="btn-retry" aria-label="Ulangi ujian">
            🔁 Ulangi Ujian
          </button>
          <button class="btn-secondary" id="btn-courses" aria-label="Pilih mata kuliah lain">
            📚 Mata Kuliah Lain
          </button>
        </div>
      </div>
    </section>

    <!-- Review section -->
    <section class="review-section">
      <h2 class="review-title">Review Jawaban</h2>
      <div class="review-list" id="review-list" aria-label="Daftar review jawaban">
        <!-- Diisi oleh result.js -->
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
  <script src="js/music.js"></script>
  <script src="js/result.js"></script>
</body>
</html>
